name: Feature request
description: Suggest an idea or improvement for the warmbly-go SDK
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to warmbly-go!

        Please describe the problem you are trying to solve before proposing a
        specific solution — it helps us understand the use case.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why is this important?
      placeholder: As a user of the SDK, I want to ... so that ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution or API you would like to see.
      placeholder: I would like a new method client.Campaigns.Pause(ctx, id) that ...
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you have considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, links, or screenshots about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched the existing issues and this feature has not already been requested.
          required: true
